name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Detect Template and Mock Initialization
        run: |
          if [ -d "src/{project}" ]; then
            echo "Template detected. Mocking initialization for CI..."
            make init PROJECT=harness_test DESCRIPTION="CI Test Run" PYTHON=3.12 LICENSE=MIT
          else
            echo "Project already initialized. Skipping mock initialization."
          fi

      - name: Install dependencies
        run: make install

      - name: Run checks
        run: make check

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
