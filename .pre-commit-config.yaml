repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.5.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
  - id: check-toml
  - id: check-json
  - id: check-added-large-files
  - id: check-case-conflict
  - id: check-merge-conflict
  - id: check-docstring-first
  - id: debug-statements

- repo: local
  hooks:
  - id: ruff-format
    name: ruff format
    entry: make format
    language: system
    types: [ python ]
    pass_filenames: false
  - id: ruff-lint
    name: ruff lint
    entry: make lint
    language: system
    types: [ python ]
    pass_filenames: false
  - id: mypy
    name: mypy
    entry: make type-check
    language: system
    types: [ python ]
    pass_filenames: false
  - id: bandit
    name: bandit
    entry: make security-check
    language: system
    types: [ python ]
    pass_filenames: false

- repo: https://github.com/gitleaks/gitleaks
  rev: v8.18.2
  hooks:
  - id: gitleaks

- repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
  rev: v9.11.0
  hooks:
  - id: commitlint
    stages: [ commit-msg ]
    additional_dependencies: [ "@commitlint/config-conventional@18.6.2" ]
